<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Training Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 15px; position: relative; }
        .view { display: none; padding-bottom: 80px; }
        .view.active { display: block; animation: slideIn 0.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: var(--secondary); font-size: 1rem; cursor: pointer; padding: 0; }

        /* KALENDER */
        .calendar { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.85rem; }
        .cal-day.has-workout { background: var(--primary); color: #000; font-weight: bold; }
        .cal-day.today { border: 2px solid var(--secondary); }

        /* LISTEN */
        .list-item { 
            background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .info-small { color: var(--text-dim); font-size: 0.8rem; display: block; }

        /* SATZ-LOGIK */
        .set-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--secondary); }
        .set-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-box { display: none; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); }
        .history-box.show { display: block; }

        /* INPUTS */
        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        input { 
            flex: 1; background: #0f172a; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 8px; text-align: center; font-size: 1rem;
        }

        /* BUTTONS */
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); }
        .btn-danger { color: var(--accent); background: none; border: none; font-size: 0.8rem; }
        .btn-save-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 470px; z-index: 100; }
    </style>
</head>
<body>

<div class="app">

    <!-- HOME: KALENDER & ÜBERSICHT -->
    <div id="view-home" class="view active">
        <div class="header">
            <h2 id="month-label">Monat</h2>
            <div>
                <button class="back-btn" onclick="navMonth(-1)">◀</button>
                <button class="back-btn" onclick="navMonth(1)">▶</button>
            </div>
        </div>
        <div class="calendar" id="calendar-body"></div>

        <h3>Deine Pläne</h3>
        <div id="plan-list"></div>
        <button class="btn btn-ghost" onclick="createNewPlan()">+ Neuen Trainingsplan erstellen</button>
    </div>

    <!-- PLANUNG: EINHEIT KONFIGURIEREN -->
    <div id="view-config" class="view">
        <div class="header">
            <button class="back-btn" onclick="navigateTo('home')">← Abbrechen</button>
            <h2 id="config-title">Plan bearbeiten</h2>
        </div>
        <div id="config-exercise-list"></div>
        <button class="btn btn-ghost" onclick="addExerciseToConfig()">+ Übung hinzufügen</button>
        <button class="btn btn-primary" onclick="savePlanConfig()">Plan speichern</button>
    </div>

    <!-- TRAINING: ÜBUNGSAUSWAHL -->
    <div id="view-workout" class="view">
        <div class="header">
            <button class="back-btn" onclick="navigateTo('home')">← Beenden</button>
            <h2 id="workout-title">Training</h2>
        </div>
        <div id="workout-exercise-list"></div>
        <button class="btn btn-primary btn-save-fixed" onclick="finishWorkout()">Training abschließen</button>
    </div>

    <!-- ÜBUNGS-LOG: SÄTZE & HISTORIE -->
    <div id="view-exercise-detail" class="view">
        <div class="header">
            <button class="back-btn" onclick="navigateTo('workout')">← Übungen</button>
            <h2 id="detail-ex-name">Übung</h2>
        </div>
        <div id="sets-container"></div>
        <button class="btn btn-primary" onclick="navigateTo('workout')">Fertig</button>
    </div>

</div>

<script>
    // --- DATEN ---
    let appData = JSON.parse(localStorage.getItem('gym_v3_data')) || {
        plans: [
            { id: 1, name: "Push (Beispiel)", exercises: [{ name: "Bankdrücken", setsCount: 3 }, { name: "Schulterdrücken", setsCount: 3 }] }
        ],
        history: []
    };

    let currentMonth = new Date();
    let session = { planId: null, exercises: [] };
    let activeExIdx = null;
    let tempPlan = null;

    // --- NAVIGATION ---
    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') renderHome();
    }

    // --- HOME & KALENDER ---
    function renderHome() {
        renderCalendar();
        const list = document.getElementById('plan-list');
        list.innerHTML = '';
        appData.plans.forEach((plan, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div onclick="startWorkout(${idx})">
                    <strong>${plan.name}</strong>
                    <span class="info-small">${plan.exercises.length} Übungen</span>
                </div>
                <button class="back-btn" style="color:var(--text-dim)" onclick="editPlan(${idx})">⚙️</button>
            `;
            list.appendChild(div);
        });
    }

    function renderCalendar() {
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="cal-grid">' + ['MO','DI','MI','DO','FR','SA','SO'].map(d => `<div style="font-size:0.7rem;color:var(--text-dim)">${d}</div>`).join('') + '</div>';
        const grid = document.createElement('div');
        grid.className = 'cal-grid';
        
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        document.getElementById('month-label').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);

        const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=daysInMonth; d++) {
            const day = document.createElement('div');
            day.className = 'cal-day';
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if(appData.history.some(h => h.date === dateStr)) day.classList.add('has-workout');
            if(new Date().toDateString() === new Date(year,month,d).toDateString()) day.classList.add('today');
            day.innerText = d;
            grid.appendChild(day);
        }
        body.appendChild(grid);
    }

    function navMonth(dir) { currentMonth.setMonth(currentMonth.getMonth() + dir); renderHome(); }

    // --- KONFIGURATION (FIXE SÄTZE) ---
    function editPlan(idx) {
        tempPlan = JSON.parse(JSON.stringify(appData.plans[idx]));
        renderConfig();
        navigateTo('config');
    }

    function createNewPlan() {
        tempPlan = { id: Date.now(), name: "Neuer Plan", exercises: [] };
        renderConfig();
        navigateTo('config');
    }

    function renderConfig() {
        const list = document.getElementById('config-exercise-list');
        list.innerHTML = `<input type="text" value="${tempPlan.name}" oninput="tempPlan.name=this.value" style="margin-bottom:20px; font-weight:bold;">`;
        tempPlan.exercises.forEach((ex, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            div.innerHTML = `
                <div style="display:flex; gap:10px;">
                    <input type="text" placeholder="Übungsname" value="${ex.name}" oninput="tempPlan.exercises[${idx}].name=this.value">
                    <input type="number" placeholder="Sätze" value="${ex.setsCount}" oninput="tempPlan.exercises[${idx}].setsCount=this.value" style="max-width:70px;">
                </div>
                <button class="btn-danger" onclick="tempPlan.exercises.splice(${idx},1); renderConfig();">Übung entfernen</button>
            `;
            list.appendChild(div);
        });
    }

    function addExerciseToConfig() {
        tempPlan.exercises.push({ name: "", setsCount: 3 });
        renderConfig();
    }

    function savePlanConfig() {
        const idx = appData.plans.findIndex(p => p.id === tempPlan.id);
        if(idx > -1) appData.plans[idx] = tempPlan;
        else appData.plans.push(tempPlan);
        save(); navigateTo('home');
    }

    // --- TRAINING ---
    function startWorkout(planIdx) {
        const plan = appData.plans[planIdx];
        session = {
            date: new Date().toISOString().split('T')[0],
            name: plan.name,
            exercises: plan.exercises.map(ex => ({
                name: ex.name,
                sets: Array.from({length: ex.setsCount}, () => ({ weight: getLastWeight(ex.name), reps: "" }))
            }))
        };
        renderWorkoutList();
        navigateTo('workout');
    }

    function renderWorkoutList() {
        const list = document.getElementById('workout-exercise-list');
        list.innerHTML = '';
        document.getElementById('workout-title').innerText = session.name;
        session.exercises.forEach((ex, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${ex.name}</strong><span class="info-small">${ex.sets.length} Sätze geplant</span></div><span>▶</span>`;
            div.onclick = () => openExerciseLog(idx);
            list.appendChild(div);
        });
    }

    function openExerciseLog(idx) {
        activeExIdx = idx;
        const ex = session.exercises[idx];
        document.getElementById('detail-ex-name').innerText = ex.name;
        const container = document.getElementById('sets-container');
        container.innerHTML = '';

        ex.sets.forEach((set, sIdx) => {
            const history = getHistory(ex.name, sIdx);
            const card = document.createElement('div');
            card.className = 'set-card';
            card.innerHTML = `
                <div class="set-header" onclick="this.nextElementSibling.classList.toggle('show')">
                    <strong>Satz ${sIdx + 1}</strong>
                    <span style="color:var(--primary); font-size:0.8rem;">Letztes Mal: ${set.weight || '--'}kg ▼</span>
                </div>
                <div class="history-box">
                    <div class="info-small" style="margin-bottom:10px;">Historie (Reps): ${history.length ? history.join(' → ') : 'Keine Daten'}</div>
                    <div class="input-row">
                        <input type="number" placeholder="kg" value="${set.weight}" oninput="session.exercises[${activeExIdx}].sets[${sIdx}].weight=this.value">
                        <input type="number" placeholder="Reps" value="${set.reps}" oninput="session.exercises[${activeExIdx}].sets[${sIdx}].reps=this.value">
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        navigateTo('exercise-detail');
    }

    // --- DATA HELPERS ---
    function getLastWeight(name) {
        for(let i=appData.history.length-1; i>=0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[0]) return ex.sets[0].weight;
        }
        return "";
    }

    function getHistory(name, setIdx) {
        return appData.history.slice(-5).reverse().map(h => {
            const ex = h.exercises.find(e => e.name === name);
            return ex && ex.sets[setIdx] ? ex.sets[setIdx].reps : null;
        }).filter(r => r !== null);
    }

    function finishWorkout() {
        appData.history.push(JSON.parse(JSON.stringify(session)));
        save();
        alert("Training gespeichert!");
        navigateTo('home');
    }

    function save() { localStorage.setItem('gym_v3_data', JSON.stringify(appData)); }

    renderHome();
</script>

</body>
</html>
