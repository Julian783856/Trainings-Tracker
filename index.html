<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mindful Strength Tracker Pro</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #ffffff;
            --text-dim: #71717a;
            --border: #27272a;
            --accent: #ef4444;
            --input-bg: #18181b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; justify-content: center; line-height: 1.5;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; padding-bottom: 120px; }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.25s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { background: none; border: none; color: var(--secondary); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* CALENDAR */
        .calendar-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; }
        .cal-day.has-workout { background: rgba(34, 197, 94, 0.2); color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }
        .cal-day.today { border: 1px solid var(--secondary); color: var(--secondary); }
        #day-info { padding: 10px; background: var(--input-bg); border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; display: none; border-left: 4px solid var(--primary); }

        /* LISTS */
        .list-item { 
            background: var(--card); border-radius: 20px; padding: 15px 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .sort-btns { display: flex; flex-direction: column; gap: 5px; }
        .sort-btn { background: var(--input-bg); border: 1px solid var(--border); color: white; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; }

        /* CARDS */
        .set-card { background: var(--card); border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .set-body { padding: 0 20px 20px 20px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.7rem; color: var(--text-dim); text-align: center; font-weight: bold; }
        input { 
            background: var(--input-bg); border: 1px solid var(--border); color: white; 
            padding: 12px 5px; border-radius: 10px; text-align: center; font-size: 1rem; width: 100%;
        }

        /* GRAPH WIDGET */
        .stats-container { background: var(--input-bg); border-radius: 15px; padding: 15px; margin-top: 20px; }
        .graph-area { height: 120px; display: flex; align-items: flex-end; gap: 10px; padding-top: 20px; border-bottom: 1px solid var(--border); }
        .graph-bar { flex: 1; background: var(--secondary); border-radius: 4px 4px 0 0; position: relative; min-height: 2px; }
        .graph-bar::after { content: attr(data-val); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: var(--text-dim); }
        .graph-toggle { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { background: var(--border); border: none; color: white; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; flex: 1; cursor: pointer; }
        .toggle-btn.active { background: var(--secondary); }

        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); }
        .btn-save-fixed { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; z-index: 1000; }
        
        #timer-overlay {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--secondary); color: white; padding: 10px 24px; border-radius: 50px;
            font-weight: 800; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="timer-overlay">PAUSE: <span id="timer-count">60</span>s</div>

    <div class="app">
        <!-- VIEW: HOME -->
        <div id="view-home" class="view active">
            <div class="header">
                <div>
                    <h3 id="month-label" style="margin:0; color:var(--text-dim);">Monat</h3>
                    <h2 style="margin:0;">Dashboard</h2>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="back-btn" onclick="navMonth(-1)">◀</button>
                    <button class="back-btn" onclick="navMonth(1)">▶</button>
                </div>
            </div>

            <div class="calendar-card" id="calendar-body"></div>
            <div id="day-info"></div>

            <h3 style="margin-bottom: 15px;">Meine Pläne</h3>
            <div id="plan-list"></div>
            <button class="btn btn-ghost" onclick="editPlan(-1)">+ Neuen Plan erstellen</button>
            <button class="btn" style="margin-top:20px; background: #111; color: #444;" onclick="exportData()">Backup Export</button>
        </div>

        <!-- VIEW: CONFIG -->
        <div id="view-config" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('home')">← Zurück</button>
                <h2>Plan Editor</h2>
            </div>
            <input type="text" id="config-plan-name" placeholder="Plan Name" style="text-align: left; font-size: 1.5rem; border: none; border-bottom: 2px solid var(--border); background: none; border-radius: 0; margin-bottom: 20px;">
            
            <div id="config-exercise-list"></div>
            
            <button class="btn btn-ghost" onclick="addExerciseToConfig()">+ Übung hinzufügen</button>
            <button class="btn btn-primary btn-save-fixed" onclick="savePlanConfig()">Änderungen speichern</button>
        </div>

        <!-- VIEW: WORKOUT -->
        <div id="view-workout" class="view">
            <div class="header">
                <button class="back-btn" onclick="if(confirm('Abbrechen?')) navigateTo('home')">✕</button>
                <h2 id="workout-title">Training</h2>
            </div>
            <div id="workout-exercise-list"></div>
            <button class="btn btn-primary btn-save-fixed" onclick="finishWorkout()">Training Beenden</button>
        </div>

        <!-- VIEW: EXERCISE LOG -->
        <div id="view-exercise-detail" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('workout')">← Zurück</button>
                <h2 id="detail-ex-name">Übung</h2>
            </div>
            
            <div id="sets-container"></div>

            <div class="stats-container">
                <div class="graph-toggle">
                    <button id="toggle-weight" class="toggle-btn active" onclick="renderStats('weight')">Gewicht</button>
                    <button id="toggle-reps" class="toggle-btn" onclick="renderStats('reps')">Reps</button>
                </div>
                <div class="graph-area" id="graph-bars"></div>
            </div>
            
            <button class="btn btn-primary" style="margin-top: 30px;" onclick="navigateTo('workout')">Sätze bestätigen</button>
        </div>
    </div>

<script>
    let appData = JSON.parse(localStorage.getItem('mindful_v3')) || {
        plans: [{ id: Date.now(), name: "Ganzkörper", exercises: [{ name: "Kniebeugen", sets: 3, rest: 90 }] }],
        history: []
    };

    let currentMonth = new Date();
    let session = null;
    let activeExIdx = null;
    let timerInterval = null;
    let currentConfigPlan = null;

    function save() { localStorage.setItem('mindful_v3', JSON.stringify(appData)); }

    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') renderHome();
        window.scrollTo(0,0);
    }

    // --- HOME & CALENDAR ---
    function renderHome() {
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="cal-grid" style="margin-bottom:12px;">' + ['M','D','M','D','F','S','S'].map(d => `<div style="font-size:0.7rem; color:var(--text-dim)">${d}</div>`).join('') + '</div>';
        const grid = document.createElement('div'); grid.className = 'cal-grid';
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('month-label').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);

        const first = (new Date(y, m, 1).getDay() + 6) % 7;
        const days = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const workouts = appData.history.filter(h => h.date === dStr);
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day' + (workouts.length ? ' has-workout' : '');
            if(new Date().toISOString().split('T')[0] === dStr) dayEl.classList.add('today');
            dayEl.innerText = d;
            dayEl.onclick = () => showDayInfo(dStr, workouts);
            grid.appendChild(dayEl);
        }
        body.appendChild(grid);

        const pList = document.getElementById('plan-list');
        pList.innerHTML = '';
        appData.plans.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<div><strong>${p.name}</strong><br><small>${p.exercises.length} Übungen</small></div>
            <div style="display:flex; gap:10px;"><span onclick="event.stopPropagation(); deletePlan(${i})">🗑️</span><span onclick="event.stopPropagation(); editPlan(${i})">⚙️</span></div>`;
            item.onclick = () => startWorkout(i);
            pList.appendChild(item);
        });
    }

    function showDayInfo(date, workouts) {
        const info = document.getElementById('day-info');
        if(workouts.length === 0) { info.style.display = 'none'; return; }
        info.style.display = 'block';
        info.innerHTML = `<strong>${date}:</strong><br>` + workouts.map(w => w.name).join(', ');
    }

    function navMonth(d) { currentMonth.setMonth(currentMonth.getMonth() + d); renderHome(); }

    // --- CONFIG ---
    function editPlan(idx) {
        currentConfigPlan = idx === -1 ? { name: "", exercises: [] } : JSON.parse(JSON.stringify(appData.plans[idx]));
        document.getElementById('config-plan-name').value = currentConfigPlan.name;
        renderConfigEx();
        navigateTo('config');
        window.currentEditIdx = idx;
    }

    function renderConfigEx() {
        const list = document.getElementById('config-exercise-list');
        list.innerHTML = '';
        currentConfigPlan.exercises.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.style.flexDirection = 'column';
            div.innerHTML = `
                <div style="display:flex; width:100%; gap:10px; align-items:center; margin-bottom:10px;">
                    <input type="text" value="${ex.name}" oninput="currentConfigPlan.exercises[${i}].name = this.value" style="text-align:left; flex:1;">
                    <div class="sort-btns">
                        <button class="sort-btn" onclick="moveEx(${i}, -1)">▲</button>
                        <button class="sort-btn" onclick="moveEx(${i}, 1)">▼</button>
                    </div>
                    <button onclick="removeEx(${i})" style="background:none; border:none; color:var(--accent);">✕</button>
                </div>
                <div class="input-group">
                    <div class="field"><label>Sätze</label><input type="number" value="${ex.sets}" oninput="currentConfigPlan.exercises[${i}].sets = parseInt(this.value)"></div>
                    <div class="field"><label>Pause(s)</label><input type="number" value="${ex.rest}" oninput="currentConfigPlan.exercises[${i}].rest = parseInt(this.value)"></div>
                </div>`;
            list.appendChild(div);
        });
    }

    function moveEx(i, dir) {
        const target = i + dir;
        if(target < 0 || target >= currentConfigPlan.exercises.length) return;
        const temp = currentConfigPlan.exercises[i];
        currentConfigPlan.exercises[i] = currentConfigPlan.exercises[target];
        currentConfigPlan.exercises[target] = temp;
        renderConfigEx();
    }

    function removeEx(i) { currentConfigPlan.exercises.splice(i, 1); renderConfigEx(); }
    function addExerciseToConfig() { currentConfigPlan.exercises.push({name: "Neue Übung", sets: 3, rest: 60}); renderConfigEx(); }
    
    function savePlanConfig() {
        currentConfigPlan.name = document.getElementById('config-plan-name').value || "Unbenannter Plan";
        if(window.currentEditIdx === -1) appData.plans.push(currentConfigPlan);
        else appData.plans[window.currentEditIdx] = currentConfigPlan;
        save(); navigateTo('home');
    }

    function deletePlan(i) { if(confirm('Plan wirklich löschen?')) { appData.plans.splice(i, 1); save(); renderHome(); } }

    // --- WORKOUT ---
    function startWorkout(idx) {
        const p = appData.plans[idx];
        session = {
            date: new Date().toISOString().split('T')[0],
            name: p.name,
            exercises: p.exercises.map(ex => ({
                name: ex.name, rest: ex.rest,
                sets: Array.from({length: ex.sets}, () => ({ weight: getLastWeight(ex.name), reps: "", rpe: "" }))
            }))
        };
        renderWorkoutExList();
        navigateTo('workout');
    }

    function renderWorkoutExList() {
        const list = document.getElementById('workout-exercise-list');
        list.innerHTML = '';
        document.getElementById('workout-title').innerText = session.name;
        session.exercises.forEach((ex, i) => {
            const done = ex.sets.filter(s => s.reps !== "").length;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<div><strong>${ex.name}</strong><br><small>${done}/${ex.sets.length} Sätze</small></div><span>${done === ex.sets.length ? '✅' : '▶'}</span>`;
            div.onclick = () => openExDetail(i);
            list.appendChild(div);
        });
    }

    function openExDetail(idx) {
        activeExIdx = idx;
        const ex = session.exercises[idx];
        document.getElementById('detail-ex-name').innerText = ex.name;
        const container = document.getElementById('sets-container');
        container.innerHTML = '';
        ex.sets.forEach((s, si) => {
            const div = document.createElement('div');
            div.className = 'set-card';
            div.innerHTML = `<div style="padding:15px 20px; color:var(--text-dim); font-size:0.8rem; font-weight:bold;">SATZ ${si+1}</div>
                <div class="set-body"><div class="input-group">
                    <div class="field"><label>KG</label><input type="number" step="0.5" value="${s.weight}" oninput="session.exercises[${idx}].sets[${si}].weight = this.value"></div>
                    <div class="field"><label>REPS</label><input type="number" value="${s.reps}" oninput="session.exercises[${idx}].sets[${si}].reps = this.value" onfocus="startRestTimer()"></div>
                    <div class="field"><label>RPE</label><input type="number" value="${s.rpe}" oninput="session.exercises[${idx}].sets[${si}].rpe = this.value"></div>
                </div></div>`;
            container.appendChild(div);
        });
        renderStats('weight');
        navigateTo('exercise-detail');
    }

    // --- STATS GRAPH ---
    function renderStats(mode) {
        document.getElementById('toggle-weight').classList.toggle('active', mode === 'weight');
        document.getElementById('toggle-reps').classList.toggle('active', mode === 'reps');
        
        const exName = session.exercises[activeExIdx].name;
        const history = appData.history
            .filter(h => h.exercises.some(e => e.name === exName))
            .slice(-5); // Letzte 5 Einheiten

        const bars = document.getElementById('graph-bars');
        bars.innerHTML = '';
        
        if(history.length === 0) { bars.innerHTML = '<small style="color:var(--text-dim)">Keine Daten verfügbar</small>'; return; }

        const values = history.map(h => {
            const ex = h.exercises.find(e => e.name === exName);
            return mode === 'weight' ? Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0)) : Math.max(...ex.sets.map(s => parseInt(s.reps) || 0));
        });

        const max = Math.max(...values, 1);
        values.forEach(v => {
            const bar = document.createElement('div');
            bar.className = 'graph-bar';
            bar.style.height = `${(v / max) * 100}%`;
            bar.setAttribute('data-val', v);
            bars.appendChild(bar);
        });
    }

    function startRestTimer() {
        clearInterval(timerInterval);
        const overlay = document.getElementById('timer-overlay');
        let timeLeft = session.exercises[activeExIdx].rest || 60;
        overlay.style.display = 'block';
        document.getElementById('timer-count').innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-count').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timerInterval); overlay.style.display = 'none'; if(navigator.vibrate) navigator.vibrate(400); }
        }, 1000);
    }

    function getLastWeight(name) {
        for(let i=appData.history.length-1; i>=0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[0]?.weight) return ex.sets[0].weight;
        }
        return "";
    }

    function finishWorkout() {
        appData.history.push(JSON.parse(JSON.stringify(session)));
        save();
        navigateTo('home');
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(appData)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `workout_backup.json`;
        a.click();
    }

    renderHome();
</script>
</body>
</html>
