<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mindful Strength Tracker</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #ffffff;
            --text-dim: #71717a;
            --border: #27272a;
            --accent: #ef4444;
            --input-bg: #18181b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            line-height: 1.5;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 10px; }
        .back-btn { background: none; border: none; color: var(--secondary); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* CALENDAR */
        .calendar-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 30px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.85rem; color: var(--text-dim); }
        .cal-day.has-workout { background: rgba(34, 197, 94, 0.2); color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }
        .cal-day.today { border: 1px solid var(--secondary); color: var(--secondary); }

        /* LISTS & CARDS */
        .list-item { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
            cursor: pointer; transition: background 0.2s;
        }
        .list-item:active { background: #1a1a1a; }

        /* MINDFUL SET COMPONENT */
        .set-card { background: var(--card); border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .set-card.expanded { border-color: var(--secondary); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        
        .set-header-trigger {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .last-weight-pill { background: var(--input-bg); padding: 6px 14px; border-radius: 12px; font-weight: 600; color: var(--primary); }

        .set-body {
            max-height: 0; overflow: hidden; padding: 0 20px;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }
        .set-card.expanded .set-body { max-height: 300px; padding-bottom: 20px; }

        /* HISTORY PILLS */
        .history-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; display: block; }
        .history-row { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .pill { background: var(--input-bg); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; border: 1px solid var(--border); }

        /* INPUTS */
        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.7rem; color: var(--text-dim); text-align: center; font-weight: bold; }
        input { 
            background: var(--input-bg); border: 1px solid var(--border); color: white; 
            padding: 14px 10px; border-radius: 12px; text-align: center; font-size: 1.1rem; width: 100%;
            -moz-appearance: textfield;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input:focus { border-color: var(--secondary); outline: none; background: #202023; }

        /* BUTTONS */
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); margin-bottom: 20px; }
        .btn-save-fixed { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; z-index: 100; }

        /* TIMER OVERLAY */
        #timer-overlay {
            position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%);
            background: var(--secondary); color: white; padding: 10px 24px; border-radius: 50px;
            font-weight: 800; display: none; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

    <div id="timer-overlay">PAUSE: <span id="timer-count">60</span>s</div>

    <div class="app">

        <!-- VIEW: HOME -->
        <div id="view-home" class="view active">
            <div class="header">
                <div>
                    <h3 id="month-label" style="margin:0; color:var(--text-dim);">Monat</h3>
                    <h2 style="margin:0;">Dashboard</h2>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="back-btn" onclick="navMonth(-1)">◀</button>
                    <button class="back-btn" onclick="navMonth(1)">▶</button>
                </div>
            </div>

            <div class="calendar-card" id="calendar-body"></div>

            <h3 style="margin-bottom: 15px;">Trainingspläne</h3>
            <div id="plan-list"></div>
            <button class="btn btn-ghost" onclick="editPlan(-1)">+ Neuen Plan erstellen</button>
            
            <div style="margin-top: 40px; display: flex; gap: 10px;">
                <button class="btn" style="background: var(--card); color: var(--text-dim); font-size: 0.8rem; padding: 10px;" onclick="exportData()">💾 Backup Export</button>
            </div>
        </div>

        <!-- VIEW: CONFIG -->
        <div id="view-config" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('home')">← Zurück</button>
                <h2>Plan Editor</h2>
            </div>
            <input type="text" id="config-plan-name" placeholder="Name des Plans (z.B. Oberkörper)" style="margin-bottom: 25px; text-align: left; font-size: 1.4rem; padding: 0; background: none; border: none; border-bottom: 1px solid var(--border); border-radius: 0;">
            
            <div id="config-exercise-list"></div>
            
            <button class="btn btn-ghost" onclick="addExerciseToConfig()" style="margin-top: 10px;">+ Übung hinzufügen</button>
            <div style="height: 100px;"></div>
            <button class="btn btn-primary btn-save-fixed" onclick="savePlanConfig()">Plan Speichern</button>
        </div>

        <!-- VIEW: WORKOUT -->
        <div id="view-workout" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('home')">✕ Abbruch</button>
                <h2 id="workout-title">Training</h2>
            </div>
            <div id="workout-exercise-list"></div>
            <div style="height: 100px;"></div>
            <button class="btn btn-primary btn-save-fixed" onclick="finishWorkout()">Training Beenden</button>
        </div>

        <!-- VIEW: EXERCISE LOG -->
        <div id="view-exercise-detail" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('workout')">← Alle Übungen</button>
            </div>
            <h2 id="detail-ex-name" style="margin-top: 0; margin-bottom: 25px; font-size: 1.8rem;">Übung</h2>
            
            <div id="sets-container"></div>
            
            <button class="btn btn-primary" style="margin-top: 20px; background: var(--card); border: 1px solid var(--border); color: var(--text-dim);" onclick="navigateTo('workout')">Fertig</button>
        </div>

    </div>

<script>
    // --- STORAGE & INIT ---
    let appData = JSON.parse(localStorage.getItem('mindful_v2')) || {
        plans: [{ id: 1, name: "Ganzkörper", exercises: [{ name: "Kniebeugen", sets: 3, rest: 90 }] }],
        history: []
    };

    let currentMonth = new Date();
    let session = null;
    let activeExIdx = null;
    let timerInterval = null;

    function save() { localStorage.setItem('mindful_v2', JSON.stringify(appData)); }

    // --- NAVIGATION ---
    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') renderHome();
        window.scrollTo(0,0);
    }

    // --- CALENDAR ---
    function renderHome() {
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="cal-grid" style="margin-bottom:12px;">' + ['M','D','M','D','F','S','S'].map(d => `<div style="font-size:0.7rem; font-weight:bold; color:var(--text-dim)">${d}</div>`).join('') + '</div>';
        const grid = document.createElement('div'); grid.className = 'cal-grid';
        
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('month-label').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);

        const first = (new Date(y, m, 1).getDay() + 6) % 7;
        const days = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day' + (appData.history.some(h => h.date === dStr) ? ' has-workout' : '');
            if(new Date().toISOString().split('T')[0] === dStr) dayEl.classList.add('today');
            dayEl.innerText = d;
            grid.appendChild(dayEl);
        }
        body.appendChild(grid);

        const pList = document.getElementById('plan-list');
        pList.innerHTML = '';
        appData.plans.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<div><strong style="font-size:1.1rem;">${p.name}</strong><br><small style="color:var(--text-dim)">${p.exercises.length} Übungen</small></div><span onclick="event.stopPropagation(); editPlan(${i})" style="padding:10px;">⚙️</span>`;
            item.onclick = () => startWorkout(i);
            pList.appendChild(item);
        });
    }
    function navMonth(d) { currentMonth.setMonth(currentMonth.getMonth() + d); renderHome(); }

    // --- PLAN CONFIG ---
    let editingIdx = -1;
    function editPlan(idx) {
        editingIdx = idx;
        const p = idx === -1 ? { name: "", exercises: [] } : appData.plans[idx];
        document.getElementById('config-plan-name').value = p.name;
        renderConfigEx(p.exercises);
        navigateTo('config');
    }
    function renderConfigEx(exs) {
        const list = document.getElementById('config-exercise-list');
        list.innerHTML = '';
        exs.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.style.flexDirection = 'column';
            div.style.alignItems = 'stretch';
            div.innerHTML = `
                <input type="text" value="${ex.name}" oninput="updateExMeta(${i}, 'name', this.value)" style="text-align:left; font-weight:bold; margin-bottom:10px;">
                <div class="input-group">
                    <div class="field"><label>Sätze</label><input type="number" value="${ex.sets}" oninput="updateExMeta(${i}, 'sets', this.value)"></div>
                    <div class="field"><label>Pause</label><input type="number" value="${ex.rest}" oninput="updateExMeta(${i}, 'rest', this.value)"></div>
                    <button onclick="removeEx(${i})" style="background:none; border:none; color:var(--accent); font-size:0.8rem;">Löschen</button>
                </div>`;
            list.appendChild(div);
        });
    }
    function updateExMeta(i, k, v) { 
        if(k === 'name') appData.plans[editingIdx].exercises[i].name = v;
        else appData.plans[editingIdx].exercises[i][k] = parseInt(v);
    }
    function addExerciseToConfig() {
        if(editingIdx === -1) { 
            appData.plans.push({id: Date.now(), name: "Neuer Plan", exercises: []});
            editingIdx = appData.plans.length - 1;
        }
        appData.plans[editingIdx].exercises.push({name: "Neue Übung", sets: 3, rest: 60});
        renderConfigEx(appData.plans[editingIdx].exercises);
    }
    function removeEx(i) { appData.plans[editingIdx].exercises.splice(i, 1); renderConfigEx(appData.plans[editingIdx].exercises); }
    function savePlanConfig() { save(); navigateTo('home'); }

    // --- WORKOUT LOGIC ---
    function startWorkout(idx) {
        const p = appData.plans[idx];
        session = {
            date: new Date().toISOString().split('T')[0],
            name: p.name,
            exercises: p.exercises.map(ex => ({
                name: ex.name,
                rest: ex.rest,
                sets: Array.from({length: ex.sets}, () => ({ weight: getLastWeight(ex.name), reps: "", rpe: "" }))
            }))
        };
        renderWorkoutExList();
        navigateTo('workout');
    }

    function renderWorkoutExList() {
        const list = document.getElementById('workout-exercise-list');
        list.innerHTML = '';
        document.getElementById('workout-title').innerText = session.name;
        session.exercises.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const done = ex.sets.filter(s => s.reps !== "").length;
            div.innerHTML = `<div><strong>${ex.name}</strong><br><small style="color:${done === ex.sets.length ? 'var(--primary)' : 'var(--text-dim)'}">${done}/${ex.sets.length} Sätze fertig</small></div><span>${done === ex.sets.length ? '✅' : '▶'}</span>`;
            div.onclick = () => openExDetail(i);
            list.appendChild(div);
        });
    }

    function openExDetail(idx) {
        activeExIdx = idx;
        const ex = session.exercises[idx];
        document.getElementById('detail-ex-name').innerText = ex.name;
        const container = document.getElementById('sets-container');
        container.innerHTML = '';

        ex.sets.forEach((s, si) => {
            const history = getHistoryReps(ex.name, si);
            const card = document.createElement('div');
            card.className = 'set-card';
            card.id = `card-${si}`;
            card.innerHTML = `
                <div class="set-header-trigger" onclick="document.getElementById('card-${si}').classList.toggle('expanded')">
                    <span style="font-weight:bold; color:var(--text-dim)">SATZ ${si+1}</span>
                    <span class="last-weight-pill">${s.weight || '--'} kg</span>
                </div>
                <div class="set-body">
                    <span class="history-label">Letzte Ergebnisse</span>
                    <div class="history-row">
                        ${history.map(h => `<div class="pill">${h} Reps</div>`).join('') || '<div class="pill">Keine Historie</div>'}
                    </div>
                    <div class="input-group">
                        <div class="field"><label>KG</label><input type="number" step="0.5" value="${s.weight}" oninput="updateSetData(${si}, 'weight', this.value)"></div>
                        <div class="field"><label>REPS</label><input type="number" value="${s.reps}" oninput="updateSetData(${si}, 'reps', this.value)" onfocus="startRestTimer()"></div>
                        <div class="field"><label>RPE</label><input type="number" value="${s.rpe}" placeholder="1-10" oninput="updateSetData(${si}, 'rpe', this.value)"></div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        navigateTo('exercise-detail');
    }

    function updateSetData(si, k, v) { session.exercises[activeExIdx].sets[si][k] = v; }

    function startRestTimer() {
        clearInterval(timerInterval);
        const overlay = document.getElementById('timer-overlay');
        const countEl = document.getElementById('timer-count');
        let timeLeft = session.exercises[activeExIdx].rest || 60;
        overlay.style.display = 'block';
        countEl.innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--;
            countEl.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                overlay.style.display = 'none';
                if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
            }
        }, 1000);
    }

    function getLastWeight(name) {
        for(let i=appData.history.length-1; i>=0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[0]) return ex.sets[0].weight;
        }
        return "";
    }

    function getHistoryReps(name, si) {
        let res = [];
        for(let i=appData.history.length-1; i>=0 && res.length < 3; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[si] && ex.sets[si].reps) res.push(ex.sets[si].reps);
        }
        return res;
    }

    function finishWorkout() {
        appData.history.push(JSON.parse(JSON.stringify(session)));
        save();
        navigateTo('home');
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(appData)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `mindful_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    renderHome();
</script>
</body>
</html>
