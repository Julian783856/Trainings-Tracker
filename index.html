<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mindful Strength Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000; --card: #121212; --primary: #22c55e; --secondary: #3b82f6;
            --text: #fff; --text-dim: #71717a; --border: #27272a; --input-bg: #1c1c1e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; padding-bottom: 100px; }
        .view { display: none; } .view.active { display: block; }

        /* UI Elements */
        .card { background: var(--card); border-radius: 18px; border: 1px solid var(--border); padding: 15px; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        .has-workout { background: rgba(34, 197, 94, 0.25); color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }
        .today { border: 1px solid var(--secondary); color: var(--secondary); }

        .list-item { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* Interactive Workout Area */
        .set-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
        .set-header { padding: 14px; display: flex; justify-content: space-between; background: #18181b; }
        .set-body { display: none; padding: 15px; background: #0a0a0a; border-top: 1px solid var(--border); }
        .set-card.expanded .set-body { display: block; }
        
        .history-pills { display: flex; gap: 6px; margin-bottom: 12px; }
        .pill { background: #27272a; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; color: #a1a1aa; border: 1px solid #3f3f46; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; text-align: center; font-size: 1rem; width: 100%; }
        input:focus { border-color: var(--secondary); outline: none; }

        /* Buttons */
        .btn { padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); width: 100%; margin-top: 10px; }
        .btn-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #timer { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--secondary); color: white; padding: 6px 20px; border-radius: 30px; font-weight: bold; z-index: 1000; display: none; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .chart-container { height: 250px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="timer">PAUSE: <span id="t-val">60</span>s</div>

<div class="app">
    <!-- STARTSEITE -->
    <div id="view-home" class="view active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="month-name" style="margin:0">Mai 2024</h2>
            <div style="display:flex; gap:5px;">
                <button class="btn" onclick="changeMonth(-1)" style="background:none; color:white; padding:10px;">◀</button>
                <button class="btn" onclick="changeMonth(1)" style="background:none; color:white; padding:10px;">▶</button>
            </div>
        </div>
        
        <div class="card" id="cal-container"></div>

        <h3>Deine Trainingspläne</h3>
        <div id="plan-list"></div>
        <button class="btn btn-ghost" onclick="openEditor(-1)">+ Plan erstellen</button>
    </div>

    <!-- WORKOUT TRACKER -->
    <div id="view-workout" class="view">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="wo-name">Training</h2>
            <button onclick="if(confirm('Abbrechen?')) navigate('home')" style="background:none; border:none; color:var(--text-dim)">Beenden</button>
        </div>
        <div id="exercise-list"></div>
        <button class="btn btn-primary btn-fixed" onclick="finishWorkout()">Training Speichern</button>
    </div>

    <!-- ÜBUNGSDETAILS & GRAPH -->
    <div id="view-detail" class="view">
        <button onclick="navigate('workout')" style="background:none; border:none; color:var(--secondary); font-size:1rem; padding:10px 0;">← Zurück</button>
        <h2 id="det-ex-name" style="margin-top:0">Übung</h2>
        
        <div id="det-sets-container"></div>

        <div class="card" style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:bold;">Analyse</span>
                <select id="chart-type" onchange="updateChart()" style="background:#27272a; color:white; border:none; padding:5px; border-radius:5px;">
                    <option value="weight">Gewicht (Max)</option>
                    <option value="reps">Wiederholungen</option>
                </select>
            </div>
            <div class="chart-container"><canvas id="progressChart"></canvas></div>
        </div>
    </div>

    <!-- PLAN EDITOR -->
    <div id="view-editor" class="view">
        <h2>Plan bearbeiten</h2>
        <input type="text" id="edit-plan-name" placeholder="Name des Plans (z.B. Push)" style="margin-bottom:20px; text-align:left;">
        <div id="edit-ex-list"></div>
        <button class="btn btn-ghost" onclick="addExToPlan()">+ Übung hinzufügen</button>
        <button class="btn btn-primary btn-fixed" onclick="savePlan()">Plan speichern</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('mindful_v5')) || {
        plans: [{ name: "Ganzkörper", exercises: [{ name: "Kniebeugen", sets: 3, rest: 90 }] }],
        history: []
    };
    let session = null;
    let activeExIdx = null;
    let chartObj = null;
    let currentMonth = new Date();

    function save() { localStorage.setItem('mindful_v5', JSON.stringify(db)); }
    function navigate(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        if(id === 'home') renderHome();
    }

    // --- HOME & KALENDER ---
    function renderHome() {
        const container = document.getElementById('cal-container');
        container.innerHTML = '<div class="cal-grid" style="color:var(--text-dim); font-size:0.7rem; margin-bottom:10px;">' + ['MO','DI','MI','DO','FR','SA','SO'].map(d => `<div>${d}</div>`).join('') + '</div>';
        
        const grid = document.createElement('div'); grid.className = 'cal-grid';
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('month-name').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);
        
        const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
        const daysInMonth = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            if(db.history.some(h => h.date === dateStr)) dayEl.classList.add('has-workout');
            if(new Date().toISOString().split('T')[0] === dateStr) dayEl.classList.add('today');
            dayEl.innerText = d;
            dayEl.onclick = () => deleteWorkout(dateStr);
            grid.appendChild(dayEl);
        }
        container.appendChild(grid);

        const pList = document.getElementById('plan-list'); pList.innerHTML = '';
        db.plans.forEach((p, i) => {
            const div = document.createElement('div'); div.className = 'list-item';
            div.innerHTML = `<div><strong>${p.name}</strong></div><button onclick="event.stopPropagation(); openEditor(${i})" style="background:none; border:none; font-size:1.2rem;">⚙️</button>`;
            div.onclick = () => startWorkout(i);
            pList.appendChild(div);
        });
    }

    function deleteWorkout(date) {
        if(confirm('Training am ' + date + ' löschen?')) {
            db.history = db.history.filter(h => h.date !== date);
            save(); renderHome();
        }
    }

    function changeMonth(v) { currentMonth.setMonth(currentMonth.getMonth() + v); renderHome(); }

    // --- WORKOUT ---
    function startWorkout(planIdx) {
        const p = db.plans[planIdx];
        session = {
            name: p.name,
            date: new Date().toISOString().split('T')[0],
            exercises: p.exercises.map(ex => ({
                name: ex.name, rest: ex.rest,
                sets: Array.from({length: ex.sets}, () => ({ weight: getPrevValue(ex.name, 'weight'), reps: "" }))
            }))
        };
        renderWorkout(); navigate('workout');
    }

    function renderWorkout() {
        const list = document.getElementById('exercise-list'); list.innerHTML = '';
        session.exercises.forEach((ex, i) => {
            const div = document.createElement('div'); div.className = 'list-item';
            const count = ex.sets.filter(s => s.reps !== "").length;
            div.innerHTML = `<div><strong>${ex.name}</strong><br><small>${count} / ${ex.sets.length} Sätze fertig</small></div><span>➔</span>`;
            div.onclick = () => openDetails(i);
            list.appendChild(div);
        });
    }

    function openDetails(idx) {
        activeExIdx = idx;
        const ex = session.exercises[idx];
        document.getElementById('det-ex-name').innerText = ex.name;
        const container = document.getElementById('det-sets-container'); container.innerHTML = '';

        ex.sets.forEach((s, si) => {
            const history = getSetHistory(ex.name, si);
            const card = document.createElement('div'); card.className = 'set-card';
            card.innerHTML = `
                <div class="set-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span>SATZ ${si+1}</span>
                    <span style="color:var(--primary)">${s.weight || '--'} kg</span>
                </div>
                <div class="set-body">
                    <div class="history-pills">${history.map(h => `<div class="pill">${h} kg</div>`).join('')}</div>
                    <div class="input-group">
                        <input type="number" step="0.5" placeholder="kg" value="${s.weight}" oninput="session.exercises[${idx}].sets[${si}].weight=this.value">
                        <input type="number" placeholder="Reps" value="${s.reps}" oninput="session.exercises[${idx}].sets[${si}].reps=this.value" onfocus="startTimer(${ex.rest})">
                    </div>
                </div>`;
            container.appendChild(card);
        });
        updateChart(); navigate('detail');
    }

    function updateChart() {
        const type = document.getElementById('chart-type').value;
        const exName = session.exercises[activeExIdx].name;
        const history = db.history.filter(h => h.exercises.some(e => e.name === exName));
        
        const labels = history.map(h => h.date);
        const dataPoints = history.map(h => {
            const ex = h.exercises.find(e => e.name === exName);
            return type === 'weight' ? Math.max(...ex.sets.map(s => s.weight || 0)) : ex.sets.reduce((sum, s) => sum + (parseInt(s.reps) || 0), 0);
        });

        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('progressChart'), {
            type: 'line',
            data: { labels, datasets: [{ label: exName, data: dataPoints, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3 }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#27272a' } } } }
        });
    }

    // --- HELPER ---
    function startTimer(sec) {
        clearInterval(window.timerInt);
        document.getElementById('timer').style.display = 'block';
        window.timerInt = setInterval(() => {
            sec--; document.getElementById('t-val').innerText = sec;
            if(sec <= 0) { clearInterval(window.timerInt); document.getElementById('timer').style.display = 'none'; }
        }, 1000);
    }

    function getPrevValue(name, key) {
        const last = db.history.slice().reverse().find(h => h.exercises.some(e => e.name === name));
        if(!last) return "";
        return last.exercises.find(e => e.name === name).sets[0][key];
    }

    function getSetHistory(name, setIdx) {
        return db.history.slice(-3).reverse().map(h => {
            const ex = h.exercises.find(e => e.name === name);
            return ex && ex.sets[setIdx] ? ex.sets[setIdx].weight : null;
        }).filter(v => v);
    }

    function finishWorkout() {
        db.history.push(session); save(); navigate('home');
    }

    // --- EDITOR ---
    let editingPlanIdx = -1;
    function openEditor(idx) {
        editingPlanIdx = idx;
        const p = idx === -1 ? { name: "", exercises: [] } : db.plans[idx];
        document.getElementById('edit-plan-name').value = p.name;
        renderEditorList(p.exercises);
        navigate('editor');
    }
    function renderEditorList(exs) {
        const list = document.getElementById('edit-ex-list'); list.innerHTML = '';
        exs.forEach((ex, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<input type="text" value="${ex.name}" oninput="updateEx(${i}, 'name', this.value)" style="margin-bottom:10px; text-align:left;">
            <div class="input-group">
                <input type="number" value="${ex.sets}" oninput="updateEx(${i}, 'sets', this.value)">
                <input type="number" value="${ex.rest}" oninput="updateEx(${i}, 'rest', this.value)">
            </div>
            <button onclick="removeEx(${i})" style="color:red; background:none; border:none; margin-top:10px; width:100%;">Löschen</button>`;
            list.appendChild(d);
        });
    }
    function updateEx(i, k, v) { 
        if(editingPlanIdx === -1) return;
        db.plans[editingPlanIdx].exercises[i][k] = (k === 'name' ? v : parseInt(v)); 
    }
    function addExToPlan() {
        if(editingPlanIdx === -1) { db.plans.push({name: "Neuer Plan", exercises: []}); editingPlanIdx = db.plans.length-1; }
        db.plans[editingPlanIdx].exercises.push({name: "Übung", sets: 3, rest: 60});
        renderEditorList(db.plans[editingPlanIdx].exercises);
    }
    function savePlan() { 
        db.plans[editingPlanIdx].name = document.getElementById('edit-plan-name').value;
        save(); navigate('home'); 
    }

    renderHome();
</script>
</body>
</html>
