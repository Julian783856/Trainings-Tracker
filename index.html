<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elite Training Tracker</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #171717;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #ffffff;
            --text-dim: #a3a3a3;
            --border: #262626;
            --accent: #ef4444;
            --timer-bg: #1e1b4b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            overscroll-behavior: none;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; position: relative; }
        .view { display: none; padding-bottom: 120px; }
        .view.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .back-btn { background: none; border: none; color: var(--secondary); font-size: 1rem; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; }

        /* CALENDAR */
        .calendar { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); margin-bottom: 25px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; transition: 0.2s; }
        .cal-day.has-workout { background: var(--primary); color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .cal-day.today { border: 2px solid var(--secondary); }

        /* LISTS */
        .list-item { 
            background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
            cursor: pointer; transition: transform 0.1s;
        }
        .list-item:active { transform: scale(0.98); }
        .info-small { color: var(--text-dim); font-size: 0.8rem; margin-top: 4px; display: block; }

        /* SET CARD & LOGGING */
        .set-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .set-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-row { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .input-field { display: flex; flex-direction: column; gap: 5px; }
        .input-field label { font-size: 0.7rem; color: var(--text-dim); text-align: center; text-transform: uppercase; }
        
        input { 
            background: #000; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 10px; text-align: center; font-size: 1.1rem; width: 100%;
        }
        input:focus { border-color: var(--secondary); }

        /* REST TIMER */
        #timer-overlay {
            position: fixed; top: 20px; right: 20px; background: var(--timer-bg); color: white;
            padding: 10px 20px; border-radius: 50px; font-weight: bold; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; border: 1px solid var(--secondary);
        }

        /* BUTTONS */
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); margin-bottom: 15px; }
        .btn-save-fixed { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .footer-tools { display: flex; gap: 10px; margin-top: 30px; }
        .btn-small { padding: 10px; font-size: 0.8rem; background: var(--card); color: var(--text-dim); border: 1px solid var(--border); border-radius: 10px; flex: 1; }
    </style>
</head>
<body>

    <div id="timer-overlay">Pause: <span id="timer-count">60</span>s</div>

    <div class="app">

        <!-- VIEW: HOME -->
        <div id="view-home" class="view active">
            <div class="header">
                <h2 id="month-label">Monat</h2>
                <div style="display: flex; gap: 15px;">
                    <button class="back-btn" onclick="navMonth(-1)">◀</button>
                    <button class="back-btn" onclick="navMonth(1)">▶</button>
                </div>
            </div>
            <div class="calendar" id="calendar-body"></div>

            <h3>Trainingspläne</h3>
            <div id="plan-list"></div>
            <button class="btn btn-ghost" onclick="editPlan(-1)">+ Neuen Plan erstellen</button>

            <div class="footer-tools">
                <button class="btn-small" onclick="exportData()">Backup Export</button>
                <button class="btn-small" onclick="importData()">Backup Import</button>
            </div>
        </div>

        <!-- VIEW: KONFIGURATION -->
        <div id="view-config" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('home')">← Zurück</button>
                <h2>Plan Editor</h2>
            </div>
            <input type="text" id="config-plan-name" placeholder="Name des Plans (z.B. Pull Day)" style="margin-bottom: 20px; text-align: left;">
            <div id="config-exercise-list"></div>
            <button class="btn btn-ghost" onclick="addExerciseToConfig()">+ Übung hinzufügen</button>
            <button class="btn btn-primary btn-save-fixed" onclick="savePlanConfig()">Plan Speichern</button>
        </div>

        <!-- VIEW: WORKOUT ÜBERSICHT -->
        <div id="view-workout" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('home')">✕ Abbrechen</button>
                <h2 id="workout-title">Training</h2>
            </div>
            <div id="workout-exercise-list"></div>
            <button class="btn btn-primary btn-save-fixed" onclick="finishWorkout()">Training Beenden</button>
        </div>

        <!-- VIEW: ÜBUNGS LOG -->
        <div id="view-exercise-detail" class="view">
            <div class="header">
                <button class="back-btn" onclick="navigateTo('workout')">← Übungen</button>
                <h2 id="detail-ex-name">Übung</h2>
            </div>
            <div id="sets-container"></div>
            <button class="btn btn-primary" onclick="startRestTimer(); navigateTo('workout');">Satz fertig & Pause</button>
        </div>

    </div>

<script>
    // --- DATEN & INITIALISIERUNG ---
    let appData = JSON.parse(localStorage.getItem('elite_tracker_v1')) || {
        plans: [{ id: 1, name: "Ganzkörper", exercises: [{ name: "Kniebeugen", sets: 3, rest: 90 }, { name: "Bankdrücken", sets: 3, rest: 90 }] }],
        history: []
    };

    let currentMonth = new Date();
    let session = null;
    let activeExIdx = null;
    let timerInterval = null;

    function save() { localStorage.setItem('elite_tracker_v1', JSON.stringify(appData)); }

    // --- NAVIGATION ---
    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') renderHome();
        window.scrollTo(0,0);
    }

    // --- HOME & CALENDAR ---
    function renderHome() {
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="cal-grid" style="margin-bottom:10px; color:var(--text-dim); font-size:0.7rem;">' + ['MO','DI','MI','DO','FR','SA','SO'].map(d => `<div>${d}</div>`).join('') + '</div>';
        const grid = document.createElement('div');
        grid.className = 'cal-grid';
        
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('month-label').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);

        const first = (new Date(y, m, 1).getDay() + 6) % 7;
        const days = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day' + (appData.history.some(h => h.date === dateStr) ? ' has-workout' : '');
            if(new Date().toDateString() === new Date(y,m,d).toDateString()) dayEl.classList.add('today');
            dayEl.innerText = d;
            grid.appendChild(dayEl);
        }
        body.appendChild(grid);

        const pList = document.getElementById('plan-list');
        pList.innerHTML = '';
        appData.plans.forEach((p, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<div><strong>${p.name}</strong><span class="info-small">${p.exercises.length} Übungen</span></div><span onclick="event.stopPropagation(); editPlan(${i})">⚙️</span>`;
            item.onclick = () => startWorkout(i);
            pList.appendChild(item);
        });
    }

    function navMonth(d) { currentMonth.setMonth(currentMonth.getMonth() + d); renderHome(); }

    // --- PLAN EDITOR ---
    let editingPlanIdx = -1;
    function editPlan(idx) {
        editingPlanIdx = idx;
        const p = idx === -1 ? { name: "", exercises: [] } : appData.plans[idx];
        document.getElementById('config-plan-name').value = p.name;
        renderConfigExercises(p.exercises);
        navigateTo('config');
    }

    function renderConfigExercises(exs) {
        const list = document.getElementById('config-exercise-list');
        list.innerHTML = '';
        exs.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'set-card';
            div.innerHTML = `
                <input type="text" value="${ex.name}" placeholder="Übungsname" oninput="appData.plans[${editingPlanIdx}].exercises[${i}].name=this.value" style="margin-bottom:10px; text-align:left;">
                <div class="input-grid">
                    <div class="input-field"><label>Sätze</label><input type="number" value="${ex.sets}" oninput="updateConfigEx(${i}, 'sets', this.value)"></div>
                    <div class="input-field"><label>Pause (s)</label><input type="number" value="${ex.rest}" oninput="updateConfigEx(${i}, 'rest', this.value)"></div>
                    <button class="btn-danger" style="background:none; border:none; color:var(--accent); font-size:0.8rem;" onclick="removeConfigEx(${i})">Löschen</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function addExerciseToConfig() {
        const p = editingPlanIdx === -1 ? null : appData.plans[editingPlanIdx]; // Vereinfacht für Demo
        const newEx = { name: "Neue Übung", sets: 3, rest: 60 };
        if(editingPlanIdx === -1) { /* Logik für neuen Plan */ } else { appData.plans[editingPlanIdx].exercises.push(newEx); renderConfigExercises(appData.plans[editingPlanIdx].exercises); }
    }

    function savePlanConfig() {
        const name = document.getElementById('config-plan-name').value;
        if(editingPlanIdx === -1) appData.plans.push({ id: Date.now(), name, exercises: [] });
        else appData.plans[editingPlanIdx].name = name;
        save(); navigateTo('home');
    }

    // --- WORKOUT LOGIK ---
    function startWorkout(idx) {
        const p = appData.plans[idx];
        session = {
            date: new Date().toISOString().split('T')[0],
            name: p.name,
            exercises: p.exercises.map(ex => ({
                name: ex.name,
                rest: ex.rest,
                sets: Array.from({length: ex.sets}, () => ({ weight: getLastData(ex.name, 'weight'), reps: "", rpe: "" }))
            }))
        };
        renderWorkoutExList();
        navigateTo('workout');
    }

    function renderWorkoutExList() {
        const list = document.getElementById('workout-exercise-list');
        list.innerHTML = '';
        document.getElementById('workout-title').innerText = session.name;
        session.exercises.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const done = ex.sets.filter(s => s.reps !== "").length;
            div.innerHTML = `<div><strong>${ex.name}</strong><span class="info-small">${done} / ${ex.sets.length} Sätze fertig</span></div><span>${done === ex.sets.length ? '✅' : '▶'}</span>`;
            div.onclick = () => openExDetail(i);
            list.appendChild(div);
        });
    }

    function openExDetail(idx) {
        activeExIdx = idx;
        const ex = session.exercises[idx];
        document.getElementById('detail-ex-name').innerText = ex.name;
        const container = document.getElementById('sets-container');
        container.innerHTML = '';

        ex.sets.forEach((s, si) => {
            const hist = getHist(ex.name, si);
            const card = document.createElement('div');
            card.className = 'set-card';
            card.innerHTML = `
                <div class="set-header"><strong>Satz ${si+1}</strong></div>
                <div class="history-row">Letztes Mal: ${hist}</div>
                <div class="input-grid">
                    <div class="input-field"><label>kg</label><input type="number" value="${s.weight}" oninput="session.exercises[${idx}].sets[${si}].weight=this.value"></div>
                    <div class="input-field"><label>Reps</label><input type="number" value="${s.reps}" oninput="session.exercises[${idx}].sets[${si}].reps=this.value"></div>
                    <div class="input-field"><label>RPE</label><input type="number" value="${s.rpe}" placeholder="1-10" oninput="session.exercises[${idx}].sets[${si}].rpe=this.value"></div>
                </div>
            `;
            container.appendChild(card);
        });
        navigateTo('exercise-detail');
    }

    // --- TOOLS & HELPERS ---
    function startRestTimer() {
        clearInterval(timerInterval);
        const overlay = document.getElementById('timer-overlay');
        const countEl = document.getElementById('timer-count');
        let timeLeft = session.exercises[activeExIdx].rest || 60;
        
        overlay.style.display = 'block';
        countEl.innerText = timeLeft;

        timerInterval = setInterval(() => {
            timeLeft--;
            countEl.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                overlay.style.display = 'none';
                if(window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
            }
        }, 1000);
    }

    function getLastData(name, key) {
        for(let i=appData.history.length-1; i>=0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[0]) return ex.sets[0][key];
        }
        return "";
    }

    function getHist(name, si) {
        const last = appData.history.slice(-3).reverse();
        let res = [];
        last.forEach(h => {
            const ex = h.exercises.find(e => e.name === name);
            if(ex && ex.sets[si] && ex.sets[si].reps) res.push(`${ex.sets[si].weight}kg x ${ex.sets[si].reps}`);
        });
        return res.length ? res.join(' | ') : "Keine Daten";
    }

    function finishWorkout() {
        appData.history.push(JSON.parse(JSON.stringify(session)));
        save();
        navigateTo('home');
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(appData)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `workout_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => { appData = JSON.parse(reader.result); save(); renderHome(); };
            reader.readAsText(file);
        };
        input.click();
    }

    renderHome();
</script>
</body>
</html>
