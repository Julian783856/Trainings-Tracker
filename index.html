<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Mindful Strength Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #ffffff;
            --text-dim: #71717a;
            --border: #27272a;
            --accent: #ef4444;
            --input-bg: #18181b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            display: flex; justify-content: center; line-height: 1.5;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER & CALENDAR */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .calendar-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 0.85rem; color: var(--text-dim); cursor: pointer; position: relative; }
        .cal-day.has-workout { background: rgba(34, 197, 94, 0.2); color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }
        .cal-day.today { border: 1px solid var(--secondary); color: var(--secondary); }

        /* MODAL FOR DELETING */
        #day-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        /* WEEKLY PLANNER */
        .week-planner { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .day-config { flex: 0 0 100px; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .day-config label { font-size: 0.7rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
        .day-config select { background: none; color: white; border: none; font-size: 0.8rem; width: 100%; }

        /* MINDFUL SET & CHART */
        .set-card { background: var(--card); border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .set-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .set-body { max-height: 0; overflow: hidden; padding: 0 18px; transition: 0.3s; }
        .set-card.expanded .set-body { max-height: 400px; padding-bottom: 20px; }
        
        .chart-container { margin-top: 20px; padding: 15px; background: var(--input-bg); border-radius: 15px; display: none; }
        .chart-container.active { display: block; }

        /* INPUTS & BUTTONS */
        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input { background: var(--input-bg); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; text-align: center; width: 100%; font-size: 1rem; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 1px dashed var(--border); color: var(--text-dim); margin-bottom: 15px; }
        .btn-danger { background: var(--accent); color: white; margin-top: 10px; }
        .btn-save-fixed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; z-index: 1000; }

        #timer-overlay { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--secondary); color: white; padding: 8px 20px; border-radius: 50px; font-weight: bold; display: none; z-index: 4000; }
    </style>
</head>
<body>

<div id="day-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-date-title">Einheit</h3>
        <div id="modal-info"></div>
        <button class="btn btn-danger" onclick="deleteEntry()">Einheit löschen</button>
        <button class="btn" style="background:none; color:var(--text-dim)" onclick="closeModal()">Abbrechen</button>
    </div>
</div>

<div id="timer-overlay">PAUSE: <span id="timer-count">60</span>s</div>

<div class="app">
    <div id="view-home" class="view active">
        <div class="header">
            <div><h3 id="month-label" style="margin:0; color:var(--text-dim)">Monat</h3><h2 style="margin:0">Dashboard</h2></div>
            <div style="display:flex; gap:8px;"><button onclick="navMonth(-1)" class="btn" style="background:none; color:white">◀</button><button onclick="navMonth(1)" class="btn" style="background:none; color:white">▶</button></div>
        </div>

        <div class="calendar-card" id="calendar-body"></div>

        <h3>Wochenplaner</h3>
        <div class="week-planner" id="week-planner"></div>

        <h3>Deine Pläne</h3>
        <div id="plan-list"></div>
        <button class="btn btn-ghost" onclick="editPlan(-1)">+ Neuer Plan</button>
    </div>

    <div id="view-config" class="view">
        <div class="header"><button onclick="navigateTo('home')" style="background:none; border:none; color:var(--secondary)">← Zurück</button><h2>Plan Editor</h2></div>
        <input type="text" id="config-plan-name" placeholder="Name des Plans" style="margin-bottom:20px; text-align:left; background:none; border-bottom:1px solid var(--border)">
        <div id="config-exercise-list"></div>
        <button class="btn btn-ghost" onclick="addExerciseToConfig()">+ Übung hinzufügen</button>
        <button class="btn btn-primary btn-save-fixed" onclick="savePlanConfig()">Speichern</button>
    </div>

    <div id="view-workout" class="view">
        <div class="header"><button onclick="navigateTo('home')" style="background:none; border:none; color:var(--text-dim)">✕</button><h2 id="workout-title">Training</h2></div>
        <div id="workout-exercise-list"></div>
        <button class="btn btn-primary btn-save-fixed" onclick="finishWorkout()">Beenden</button>
    </div>

    <div id="view-exercise-detail" class="view">
        <div class="header"><button onclick="navigateTo('workout')" style="background:none; border:none; color:var(--secondary)">← Übungen</button></div>
        <h2 id="detail-ex-name">Übung</h2>
        <div id="sets-container"></div>
        
        <button class="btn btn-ghost" onclick="toggleChart()">📈 Fortschrittsgrafik ein/aus</button>
        <div class="chart-container" id="chart-wrap"><canvas id="progressChart"></canvas></div>
    </div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('mindful_pro_v3')) || {
        plans: [{ id: 1, name: "Push", exercises: [{ name: "Bankdrücken", sets: 3, rest: 90 }] }],
        history: [],
        weekPlan: { 1: "", 2: "", 3: "", 4: "", 5: "", 6: "", 7: "" } 
    };

    let currentMonth = new Date();
    let session = null;
    let activeExIdx = null;
    let timerInterval = null;
    let selectedDateStr = null;
    let chartInstance = null;

    function save() { localStorage.setItem('mindful_pro_v3', JSON.stringify(appData)); }

    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') { renderHome(); renderWeekPlanner(); }
    }

    function renderHome() {
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="cal-grid" style="margin-bottom:10px;">' + ['M','D','M','D','F','S','S'].map(d => `<div style="font-size:0.7rem; color:var(--text-dim)">${d}</div>`).join('') + '</div>';
        const grid = document.createElement('div'); grid.className = 'cal-grid';
        const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
        document.getElementById('month-label').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentMonth);
        const first = (new Date(y, m, 1).getDay() + 6) % 7;
        const days = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day' + (appData.history.some(h => h.date === dStr) ? ' has-workout' : '');
            if(new Date().toISOString().split('T')[0] === dStr) dayEl.classList.add('today');
            dayEl.innerText = d;
            dayEl.onclick = () => openDay(dStr);
            grid.appendChild(dayEl);
        }
        body.appendChild(grid);
        const pList = document.getElementById('plan-list'); pList.innerHTML = '';
        appData.plans.forEach((p, i) => {
            const item = document.createElement('div'); item.className = 'list-item';
            item.style = "background:var(--card); padding:18px; border-radius:16px; border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;";
            item.innerHTML = `<div><strong>${p.name}</strong></div><button onclick="event.stopPropagation(); editPlan(${i})" style="background:none; border:none; color:var(--text-dim)">⚙️</button>`;
            item.onclick = () => startWorkout(i);
            pList.appendChild(item);
        });
    }

    function openDay(dStr) {
        const entry = appData.history.find(h => h.date === dStr);
        if(!entry) return;
        selectedDateStr = dStr;
        document.getElementById('modal-date-title').innerText = entry.name;
        document.getElementById('modal-info').innerText = entry.date;
        document.getElementById('day-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('day-modal').style.display = 'none'; }

    function deleteEntry() {
        appData.history = appData.history.filter(h => h.date !== selectedDateStr);
        save(); closeModal(); renderHome();
    }

    function renderWeekPlanner() {
        const wp = document.getElementById('week-planner'); wp.innerHTML = '';
        const days = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
        days.forEach((d, i) => {
            const div = document.createElement('div'); div.className = 'day-config';
            let options = `<option value="">-</option>` + appData.plans.map(p => `<option value="${p.id}" ${appData.weekPlan[i+1] == p.id ? 'selected' : ''}>${p.name}</option>`).join('');
            div.innerHTML = `<label>${d}</label><select onchange="appData.weekPlan[${i+1}] = this.value; save()">${options}</select>`;
            wp.appendChild(div);
        });
    }

    function startWorkout(idx) {
        const p = appData.plans[idx];
        session = { date: new Date().toISOString().split('T')[0], name: p.name, exercises: p.exercises.map(ex => ({
            name: ex.name, rest: ex.rest, sets: Array.from({length: ex.sets}, () => ({ weight: getLastWeight(ex.name), reps: "", rpe: "" }))
        })) };
        renderWorkoutExList(); navigateTo('workout');
    }

    function renderWorkoutExList() {
        const list = document.getElementById('workout-exercise-list'); list.innerHTML = '';
        session.exercises.forEach((ex, i) => {
            const div = document.createElement('div'); div.className = 'list-item';
            div.style = "background:var(--card); padding:18px; border-radius:16px; border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between;";
            div.innerHTML = `<div><strong>${ex.name}</strong></div><span>▶</span>`;
            div.onclick = () => openExDetail(i);
            list.appendChild(div);
        });
    }

    function openExDetail(idx) {
        activeExIdx = idx; const ex = session.exercises[idx];
        document.getElementById('detail-ex-name').innerText = ex.name;
        const container = document.getElementById('sets-container'); container.innerHTML = '';
        ex.sets.forEach((s, si) => {
            const card = document.createElement('div'); card.className = 'set-card'; card.id = `scard-${si}`;
            card.innerHTML = `<div class="set-header" onclick="this.parentElement.classList.toggle('expanded')"><span>SATZ ${si+1}</span><span style="color:var(--primary)">${s.weight || '--'} kg</span></div>
            <div class="set-body"><div class="input-group">
                <input type="number" step="0.5" value="${s.weight}" oninput="session.exercises[${activeExIdx}].sets[${si}].weight=this.value">
                <input type="number" placeholder="Reps" oninput="session.exercises[${activeExIdx}].sets[${si}].reps=this.value" onfocus="startRestTimer()">
                <input type="number" placeholder="RPE" oninput="session.exercises[${activeExIdx}].sets[${si}].rpe=this.value">
            </div></div>`;
            container.appendChild(card);
        });
        document.getElementById('chart-wrap').classList.remove('active');
        navigateTo('exercise-detail');
    }

    function toggleChart() {
        const wrap = document.getElementById('chart-wrap'); wrap.classList.toggle('active');
        if(wrap.classList.contains('active')) renderChart();
    }

    function renderChart() {
        const exName = session.exercises[activeExIdx].name;
        const dataPoints = appData.history.filter(h => h.exercises.some(e => e.name === exName)).slice(-10);
        const labels = dataPoints.map(d => d.date);
        const volumes = dataPoints.map(d => {
            const ex = d.exercises.find(e => e.name === exName);
            return ex.sets.reduce((sum, s) => sum + (parseFloat(s.weight) || 0) * (parseFloat(s.reps) || 0), 0);
        });

        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('progressChart'), {
            type: 'line',
            data: { labels, datasets: [{ label: 'Volumen (kg)', data: volumes, borderColor: '#3b82f6', tension: 0.3, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#27272a' } }, x: { grid: { display: false } } } }
        });
    }

    function startRestTimer() {
        clearInterval(timerInterval);
        const overlay = document.getElementById('timer-overlay'); const countEl = document.getElementById('timer-count');
        let timeLeft = session.exercises[activeExIdx].rest || 60;
        overlay.style.display = 'block'; countEl.innerText = timeLeft;
        timerInterval = setInterval(() => {
            timeLeft--; countEl.innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timerInterval); overlay.style.display = 'none'; }
        }, 1000);
    }

    function getLastWeight(name) {
        for(let i=appData.history.length-1; i>=0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === name);
            if(ex && ex.sets[0]) return ex.sets[0].weight;
        }
        return "";
    }

    function finishWorkout() { appData.history.push(JSON.parse(JSON.stringify(session))); save(); navigateTo('home'); }
    
    // Editor Functions (kurz gefasst)
    function editPlan(idx) { editingIdx = idx; navigateTo('config'); }
    function savePlanConfig() { save(); navigateTo('home'); }
    function addExerciseToConfig() { appData.plans[0].exercises.push({name: "Neue Übung", sets: 3, rest: 60}); renderConfigEx(); }

    renderHome(); renderWeekPlanner();
</script>
</body>
</html>
