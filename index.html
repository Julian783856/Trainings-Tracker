<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Training Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
        }

        .app { width: 100%; max-width: 500px; min-height: 100vh; padding: 15px; position: relative; }
        .view { display: none; padding-bottom: 80px; }
        .view.active { display: block; animation: slideIn 0.2s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        /* HEADER & NAV */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: var(--secondary); font-size: 1rem; cursor: pointer; padding: 0; }

        /* KALENDER */
        .calendar { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 25px; border: 1px solid var(--border); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-day-label { font-size: 0.7rem; color: var(--text-dim); font-weight: bold; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.9rem; cursor: pointer; }
        .cal-day.today { border: 2px solid var(--primary); }
        .cal-day.has-workout { background: var(--primary); color: #000; font-weight: bold; }

        /* LISTEN & ITEMS */
        .list-item { 
            background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);
        }
        .exercise-item { display: flex; flex-direction: column; gap: 4px; }
        .btn-delete { color: var(--accent); background: none; border: none; padding: 5px; font-weight: bold; }

        /* ÜBUNGS DETAIL SEITE */
        .set-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--secondary); }
        .set-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .weight-preview { font-size: 0.85rem; color: var(--primary); }
        .history-expanded { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display: none; }
        .history-expanded.show { display: block; }
        .history-list { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; }

        /* INPUTS */
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        input { 
            flex: 1; background: #0f172a; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 8px; text-align: center; font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--primary); }

        /* BUTTONS */
        .btn { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer;
            margin-top: 10px; transition: 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 2px dashed var(--border); color: var(--text-dim); }
        .btn-save { background: var(--text); color: var(--bg); position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 470px; }
    </style>
</head>
<body>

<div class="app">

    <!-- VIEW: HOME / KALENDER -->
    <div id="view-home" class="view active">
        <div class="header">
            <h2 id="cal-month-title">Monat Jahr</h2>
            <div>
                <button class="back-btn" onclick="changeMonth(-1)">◀</button>
                <button class="back-btn" onclick="changeMonth(1)">▶</button>
            </div>
        </div>
        
        <div class="calendar">
            <div class="cal-grid" id="cal-labels">
                <div class="cal-day-label">MO</div><div class="cal-day-label">DI</div><div class="cal-day-label">MI</div>
                <div class="cal-day-label">DO</div><div class="cal-day-label">FR</div><div class="cal-day-label">SA</div><div class="cal-day-label">SO</div>
            </div>
            <div class="cal-grid" id="calendar-days"></div>
        </div>

        <h3>Meine Einheiten</h3>
        <div id="workout-list"></div>
        <button class="btn btn-ghost" onclick="createNewWorkout()">+ Neue Trainingseinheit</button>
    </div>

    <!-- VIEW: WORKOUT STRUKTUR (Nur Übungen) -->
    <div id="view-workout" class="view">
        <div class="header">
            <button class="back-btn" onclick="navigateTo('home')">← Zurück</button>
            <h2 id="workout-title">Einheit</h2>
        </div>
        <p style="color: var(--text-dim); font-size: 0.9rem;">Wähle eine Übung zum Starten:</p>
        <div id="exercise-list"></div>
        <button class="btn btn-ghost" onclick="addExerciseToPlan()">+ Übung hinzufügen</button>
        <button class="btn btn-save" onclick="finishFullWorkout()">Training abschließen</button>
    </div>

    <!-- VIEW: ÜBUNGS-DETAIL (Sätze & Historie) -->
    <div id="view-exercise-detail" class="view">
        <div class="header">
            <button class="back-btn" onclick="navigateTo('workout')">← Übungen</button>
            <h2 id="detail-exercise-name">Übung</h2>
        </div>
        
        <div id="sets-container"></div>
        
        <button class="btn btn-ghost" onclick="addNewSet()">+ Weiteren Satz hinzufügen</button>
        <button class="btn btn-primary" style="margin-top: 30px;" onclick="navigateTo('workout')">Sätze bestätigen</button>
    </div>

    <!-- VIEW: SUMMARY -->
    <div id="view-summary" class="view">
        <h2>Zusammenfassung</h2>
        <div class="calendar" id="summary-data"></div>
        <button class="btn btn-primary" onclick="saveToHistory()">In Historie speichern</button>
    </div>

</div>

<script>
    // --- DATENSTRUKTUR MIT DUMMY DATEN ---
    let appData = JSON.parse(localStorage.getItem('gym_pro_data')) || {
        workouts: [
            { id: 101, name: "Legs", exercises: ["Kniebeugen", "Beinbeuger", "Waden"] },
            { id: 102, name: "Upper Body", exercises: ["Bankdrücken", "Rudern", "Schulterdrücken"] }
        ],
        history: [
            // Dummy Daten für Historie der letzten 3 Male (Bankdrücken)
            { date: "2024-04-20", workoutId: 102, exercises: [{ name: "Bankdrücken", sets: [{ weight: 60, reps: 10 }, { weight: 60, reps: 8 }] }] },
            { date: "2024-04-27", workoutId: 102, exercises: [{ name: "Bankdrücken", sets: [{ weight: 62.5, reps: 10 }, { weight: 62.5, reps: 9 }] }] },
            { date: "2024-05-01", workoutId: 102, exercises: [{ name: "Bankdrücken", sets: [{ weight: 65, reps: 8 }, { weight: 65, reps: 7 }] }] }
        ]
    };

    let currentMonth = new Date();
    let activeSession = { workoutId: null, exercises: [] };
    let activeExIdx = null;

    // --- NAVIGATION ---
    function navigateTo(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        if(viewId === 'home') renderHome();
    }

    // --- KALENDER LOGIK ---
    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        const title = document.getElementById('cal-month-title');
        grid.innerHTML = '';
        
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        title.innerText = new Intl.DateTimeFormat('de-DE', { month: 'long', year: 'numeric' }).format(currentMonth);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const offset = firstDay === 0 ? 6 : firstDay - 1;

        for(let i=0; i<offset; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d<=daysInMonth; d++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'cal-day';
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            
            if(appData.history.some(h => h.date === dateStr)) dayDiv.classList.add('has-workout');
            if(new Date().toDateString() === new Date(year, month, d).toDateString()) dayDiv.classList.add('today');
            
            dayDiv.innerText = d;
            grid.appendChild(dayDiv);
        }
    }

    function changeMonth(dir) {
        currentMonth.setMonth(currentMonth.getMonth() + dir);
        renderCalendar();
    }

    // --- WORKOUT & ÜBUNGS LOGIK ---
    function renderHome() {
        renderCalendar();
        const list = document.getElementById('workout-list');
        list.innerHTML = '';
        appData.workouts.forEach((w, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `<span>${w.name}</span><button class="btn-delete" onclick="deleteWorkout(${idx}, event)">Löschen</button>`;
            div.onclick = () => startWorkoutSession(w);
            list.appendChild(div);
        });
    }

    function deleteWorkout(idx, e) {
        e.stopPropagation();
        if(confirm("Einheit löschen?")) {
            appData.workouts.splice(idx, 1);
            save(); renderHome();
        }
    }

    function startWorkoutSession(workout) {
        document.getElementById('workout-title').innerText = workout.name;
        // Initialisiere Session-Daten falls leer
        activeSession.workoutId = workout.id;
        activeSession.name = workout.name;
        activeSession.exercises = workout.exercises.map(exName => {
            return { name: exName, sets: [{ weight: getLastWeight(exName), reps: "" }] };
        });
        renderExerciseList();
        navigateTo('workout');
    }

    function renderExerciseList() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';
        activeSession.exercises.forEach((ex, idx) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="exercise-item">
                    <strong>${ex.name}</strong>
                    <small style="color:var(--text-dim)">${ex.sets.length} Sätze eingetragen</small>
                </div>
                <button class="btn-delete" onclick="removeExFromSession(${idx}, event)">×</button>
            `;
            div.onclick = () => openExerciseDetail(idx);
            list.appendChild(div);
        });
    }

    function openExerciseDetail(idx) {
        activeExIdx = idx;
        const ex = activeSession.exercises[idx];
        document.getElementById('detail-exercise-name').innerText = ex.name;
        renderSets();
        navigateTo('exercise-detail');
    }

    function renderSets() {
        const container = document.getElementById('sets-container');
        container.innerHTML = '';
        const ex = activeSession.exercises[activeExIdx];

        ex.sets.forEach((set, sIdx) => {
            const lastWeight = getLastWeight(ex.name);
            const historyReps = getLastReps(ex.name, sIdx); // Holt die Reps der letzten 3 Einheiten

            const card = document.createElement('div');
            card.className = 'set-card';
            card.innerHTML = `
                <div class="set-header" onclick="toggleHistory(${sIdx})">
                    <strong>Satz ${sIdx + 1}</strong>
                    <span class="weight-preview">Letztes Mal: ${lastWeight || '--'} kg ▼</span>
                </div>
                <div id="history-${sIdx}" class="history-expanded">
                    <div class="history-list">Historie (Reps): ${historyReps.length > 0 ? historyReps.join(' → ') : 'Keine Daten'}</div>
                    <div class="input-group">
                        <input type="number" placeholder="kg" value="${set.weight}" oninput="updateSetData(${sIdx}, 'weight', this.value)">
                        <input type="number" placeholder="Reps" value="${set.reps}" oninput="updateSetData(${sIdx}, 'reps', this.value)">
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleHistory(sIdx) {
        const el = document.getElementById(`history-${sIdx}`);
        el.classList.toggle('show');
    }

    // --- HELPER FUNKTIONEN FÜR DATEN ---
    function getLastWeight(exName) {
        for (let i = appData.history.length - 1; i >= 0; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === exName);
            if (ex && ex.sets[0]) return ex.sets[0].weight;
        }
        return "";
    }

    function getLastReps(exName, setIdx) {
        let historyReps = [];
        let count = 0;
        for (let i = appData.history.length - 1; i >= 0 && count < 3; i--) {
            const ex = appData.history[i].exercises.find(e => e.name === exName);
            if (ex && ex.sets[setIdx]) {
                historyReps.push(ex.sets[setIdx].reps);
                count++;
            }
        }
        return historyReps;
    }

    function updateSetData(sIdx, field, val) {
        activeSession.exercises[activeExIdx].sets[sIdx][field] = val;
    }

    function addNewSet() {
        const ex = activeSession.exercises[activeExIdx];
        const lastW = ex.sets[ex.sets.length-1].weight;
        ex.sets.push({ weight: lastW, reps: "" });
        renderSets();
    }

    function addExerciseToPlan() {
        const name = prompt("Name der Übung:");
        if(name) {
            activeSession.exercises.push({ name: name, sets: [{ weight: getLastWeight(name), reps: "" }] });
            renderExerciseList();
        }
    }

    function removeExFromSession(idx, e) {
        e.stopPropagation();
        activeSession.exercises.splice(idx, 1);
        renderExerciseList();
    }

    function finishFullWorkout() {
        navigateTo('summary');
        const sum = document.getElementById('summary-data');
        let totalSets = 0;
        activeSession.exercises.forEach(e => totalSets += e.sets.length);
        sum.innerHTML = `
            <p><strong>Einheit:</strong> ${activeSession.name}</p>
            <p><strong>Übungen:</strong> ${activeSession.exercises.length}</p>
            <p><strong>Sätze gesamt:</strong> ${totalSets}</p>
        `;
    }

    function saveToHistory() {
        const record = {
            date: new Date().toISOString().split('T')[0],
            workoutId: activeSession.workoutId,
            exercises: JSON.parse(JSON.stringify(activeSession.exercises))
        };
        appData.history.push(record);
        save();
        alert("Gespeichert!");
        navigateTo('home');
    }

    function save() { localStorage.setItem('gym_pro_data', JSON.stringify(appData)); }

    function createNewWorkout() {
        const name = prompt("Name der Einheit (z.B. Pull):");
        if(name) {
            appData.workouts.push({ id: Date.now(), name: name, exercises: [] });
            save(); renderHome();
        }
    }

    // Start
    renderHome();
</script>
</body>
</html>
